<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Más de Ahí Remix – Topboy, Myke Towers, Eladio Carrión, Sech</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --gold: #C8A84B;
      --gold-dim: #8a7032;
      --bg: #0a0a0a;
      --surface: #111111;
      --surface2: #1a1a1a;
      --text: #f0ece0;
      --muted: #888;
      --border: rgba(200,168,75,0.2);
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem 1rem;
      position: relative;
      overflow-x: hidden;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 60% 40% at 50% 0%, rgba(200,168,75,0.07) 0%, transparent 70%),
        radial-gradient(ellipse 40% 30% at 80% 80%, rgba(200,168,75,0.04) 0%, transparent 60%);
      pointer-events: none;
      z-index: 0;
    }

    .container {
      width: 100%;
      max-width: 820px;
      position: relative;
      z-index: 1;
    }

    .header {
      text-align: center;
      margin-bottom: 2.5rem;
      animation: fadeDown 0.7s ease both;
    }

    .tag {
      display: inline-block;
      font-size: 11px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--gold);
      border: 1px solid var(--border);
      padding: 4px 14px;
      border-radius: 2px;
      margin-bottom: 1.2rem;
      font-family: 'DM Sans', sans-serif;
      font-weight: 500;
    }

    h1 {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(3.5rem, 10vw, 7rem);
      line-height: 0.9;
      letter-spacing: 0.03em;
      color: var(--text);
      margin-bottom: 0.2em;
    }

    h1 span {
      color: var(--gold);
    }

    .artists {
      font-size: 13px;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--muted);
      font-weight: 400;
      margin-top: 1rem;
    }

    .artists strong {
      color: var(--gold-dim);
      font-weight: 500;
    }

    .player-wrap {
      position: relative;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 4px;
      overflow: hidden; clip-path: inset(0);
      animation: fadeUp 0.8s 0.2s ease both;
    }

    .player-wrap::before {
      content: '';
      display: block;
      padding-top: 62%;
    }

    .player-wrap video,
    .player-wrap iframe,
    .player-placeholder {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
    }

    .player-placeholder {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 1rem;
      background: var(--surface);
      color: var(--muted);
      font-size: 14px;
      text-align: center;
      padding: 2rem;
    }

    .play-icon {
      width: 64px;
      height: 64px;
      border-radius: 50%;
      border: 2px solid var(--gold);
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--gold);
    }

    .play-icon svg {
      width: 24px;
      height: 24px;
      margin-left: 4px;
    }

    .player-placeholder p {
      max-width: 320px;
      line-height: 1.6;
    }

    .player-placeholder code {
      font-family: monospace;
      font-size: 12px;
      background: var(--surface2);
      color: var(--gold);
      padding: 2px 8px;
      border-radius: 3px;
    }

    .controls {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-top: 1.2rem;
      flex-wrap: wrap;
      gap: 1rem;
      animation: fadeUp 0.8s 0.4s ease both;
    }

    .like-btn {
      display: flex;
      align-items: center;
      gap: 10px;
      background: transparent;
      border: 1px solid var(--border);
      color: var(--muted);
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      font-weight: 500;
      padding: 10px 22px;
      border-radius: 3px;
      cursor: pointer;
      transition: all 0.25s ease;
      letter-spacing: 0.05em;
    }

    .like-btn svg {
      width: 18px;
      height: 18px;
      transition: transform 0.2s ease;
      fill: none;
      stroke: currentColor;
      stroke-width: 1.8;
    }

    .like-btn:hover {
      border-color: rgba(200,168,75,0.5);
      color: var(--gold);
    }

    .like-btn.liked {
      border-color: var(--gold);
      color: var(--gold);
      background: rgba(200,168,75,0.07);
    }

    .like-btn.liked svg {
      fill: var(--gold);
      stroke: var(--gold);
    }

    .like-btn:active svg {
      transform: scale(1.3);
    }

    .like-count {
      font-variant-numeric: tabular-nums;
    }

    .stats {
      display: flex;
      align-items: center;
      gap: 1.5rem;
    }

    .stat {
      display: flex;
      align-items: center;
      gap: 7px;
      font-size: 13px;
      color: var(--muted);
    }

    .stat svg {
      width: 15px;
      height: 15px;
      stroke: var(--gold-dim);
      fill: none;
      stroke-width: 1.8;
      flex-shrink: 0;
    }

    .stat .val {
      color: var(--text);
      font-weight: 500;
    }

    .divider {
      height: 1px;
      background: var(--border);
      margin: 1.8rem 0;
      animation: fadeUp 0.8s 0.5s ease both;
    }

    .footer {
      text-align: center;
      font-size: 12px;
      color: #444;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      animation: fadeUp 0.8s 0.6s ease both;
    }

    @keyframes fadeDown {
      from { opacity: 0; transform: translateY(-20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @media (max-width: 768px) {
      .player-wrap::before {
        padding-top: 85%;
      }
    }

    @media (max-width: 500px) {
      .controls { flex-direction: column; align-items: flex-start; }
    }
  </style>
</head>
<body>

<div class="container">

  <header class="header">
    <div class="tag">Nuevo · Remix</div>
    <h1>Más de <span>Ahí</span><br>Remix</h1>
    <p class="artists">
      <strong>Topboy</strong> &nbsp;·&nbsp; <strong>Myke Towers</strong> &nbsp;·&nbsp;
      <strong>Eladio Carrión</strong> &nbsp;·&nbsp; <strong>Sech</strong>
    </p>
  </header>

  <div class="player-wrap" id="player">
    <iframe src="https://drive.google.com/file/d/1o7DuYsSjV5uxd-cZFwDpSFPTfnpymquw/preview" allow="autoplay" allowfullscreen frameborder="0" style="border:0; position:absolute; top:-40px; left:0; width:100%; height:calc(100% + 80px);"></iframe>
  </div>

  <div class="controls">
    <button class="like-btn" id="likeBtn" onclick="toggleLike()">
      <svg viewBox="0 0 24 24" id="likeIcon">
        <path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/>
      </svg>
      Me gusta &nbsp;<span class="like-count" id="likeCount">0</span>
    </button>

    <div class="stats">
      <div class="stat">
        <svg viewBox="0 0 24 24"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
        <span>Visitas:&nbsp;<span class="val" id="visitCount">–</span></span>
      </div>
    </div>
  </div>

  <div class="divider"></div>

  <footer class="footer">
    Topboy · Myke Towers · Eladio Carrión · Sech &nbsp;©&nbsp; 2025
  </footer>

  <!-- Contador de visitas con hits.seeyoufarm.com (invisible, solo contabiliza) -->
  <img src="https://hits.seeyoufarm.com/api/count/incr/badge.svg?url=https%3A%2F%2FTUUSUARIO.github.io%2FTUREPO&count_bg=%23C8A84B&title_bg=%230a0a0a&icon=music.svg&icon_color=%23C8A84B&title=visitas&edge_flat=true"
       id="hitsImg"
       alt="visitas"
       style="display:none;"
       onload="parseHits(this.src)" />
</div>

<script>
  const LIKE_KEY = 'masDeAhi_liked';
  const COUNT_KEY = 'masDeAhi_likeCount';

  function loadLikes() {
    const liked = localStorage.getItem(LIKE_KEY) === 'true';
    const count = parseInt(localStorage.getItem(COUNT_KEY) || '0', 10);
    document.getElementById('likeCount').textContent = count;
    if (liked) {
      document.getElementById('likeBtn').classList.add('liked');
    }
  }

  function toggleLike() {
    const btn = document.getElementById('likeBtn');
    const span = document.getElementById('likeCount');
    const liked = localStorage.getItem(LIKE_KEY) === 'true';
    let count = parseInt(localStorage.getItem(COUNT_KEY) || '0', 10);

    if (liked) {
      count = Math.max(0, count - 1);
      localStorage.setItem(LIKE_KEY, 'false');
      btn.classList.remove('liked');
    } else {
      count += 1;
      localStorage.setItem(LIKE_KEY, 'true');
      btn.classList.add('liked');
    }
    localStorage.setItem(COUNT_KEY, count);
    span.textContent = count;
  }

  function parseHits(src) {
    fetch(src.replace('badge.svg', 'json'))
      .then(r => r.json())
      .then(d => {
        const el = document.getElementById('visitCount');
        if (d && d.count) el.textContent = Number(d.count).toLocaleString();
      })
      .catch(() => {
        document.getElementById('visitCount').textContent = '—';
      });
  }

  loadLikes();
</script>

</body>
</html>
